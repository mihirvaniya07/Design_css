<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pikachuu design</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
    />
    <link rel="shortcut icon" href="images/Poké_Ball_icon.svg.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <section>
      <div class="container">
        <div class="main-box flex w-screen p-6  relative shadow-xl/30">
          <div
            class="left-box w-[60%] h-[90vh] py-8 px-16 rounded-tl-xl rounded-bl-xl overflow-hidden relative"
          >
            <div class="img-box w-[150px] h-[150px]">
              <img
                src="images/pokemon_logo_PNG5.png"
                class="object-cover"
                alt="logo"
              />
            </div>

            <div class="content flex flex-col gap-3">
              <p class="text-base font-semibold uppercase tracking-[8px]">
                Pokemon gen i
              </p>
              <h2 class="text-8xl font-bold">Pikachu</h2>
              <h4 class="text-sm">
                Pikachu is an Electric-type Pokemon introduced <br />in
                Generation I. Pikachu are small,chubby,<br />and incredibly cute
                mouse-like Pokemon. <br />They are almost completely covered by
                <br />yellow fur.
              </h4>
              <div class="number flex items-center gap-4">
                <div class="hr h-[3px] bg-black w-[60px] rounded-full"></div>
                <h4 class="text-base font-semibold">01 / 08</h4>
              </div>
            </div>

            <div
              class="last-img w-[300px] h-[300px] opacity-25 absolute bottom-[-135px] left-6"
            >
              <img
                src="images/photo_2026-05-08_19-33-21-Photoroom.png"
                alt="pokeball"
              />
            </div>
          </div>
          <div
            class="right-box w-[40%] h-[90vh] py-8 px-16 rounded-tr-xl rounded-br-xl flex flex-col items-end"
          >
            <div class="menu text-3xl">
              <i class="ri-menu-line"></i>
            </div>
            <div class="main-img absolute w-[500px] h-[400px] top-[-20px]  right-60 pikachu shadown-xl">
              <img
                src="images/c9c1fb92-26c2-44c9-9dd2-9950879aa070.png"
                alt="pikachu"
                class="object-cover"
              />
            </div>
            <div class="dots mt-[180px]">
              <div class="flex flex-col items-center gap-1">
                <i class="ri-circle-fill"></i>
                <i class="ri-circle-fill text-xs text-yellow-500"></i>
                <i class="ri-circle-fill text-xs text-yellow-500"></i>
                <i class="ri-circle-fill text-xs text-yellow-500"></i>
                <i class="ri-circle-fill text-xs text-yellow-500"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
